name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with v (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUT_NAME=toofan-${{ matrix.goos }}-${{ matrix.goarch }}
          go build -ldflags="-s -w" -o $OUT_NAME .
      
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: toofan-*
          token: ${{ secrets.GITHUB_TOKEN }}
