project_name: toofan

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

aurs:
  - name: toofan-bin
    homepage: "https://github.com/vyrx-dev/toofan"
    description: "A minimal, lightning-fast typing test for your terminal"
    maintainers:
      - "vyrx-dev <dev@vyrx.dev>"
    license: "MIT"
    private_key: '{{ .Env.AUR_KEY }}'
    git_url: 'ssh://aur@aur.archlinux.org/toofan-bin.git'
    package: |-
      # bin
      install -Dm755 "./toofan" "${pkgdir}/usr/bin/toofan"
      
      # license
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/toofan/LICENSE"
